<style>

input, select, button { padding:12px; font-size:18px; border-radius:8px; border:none; margin:5px; }
#suggestions { 
    max-height:220px; overflow-y:auto; margin:8px auto; 
    text-align:left; width:340px; background:#1f1f21; 
    border-radius:8px; border:1px solid #333;

#questionHistory div { background:#2a2a2c; margin:5px 0; padding:12px; border-radius:6px; display:flex; justify-content:space-between; align-items:center; }

button { cursor:pointer; }
#dbBtn { position: fixed; top: 15px; right: 15px; background: #444; color: white; padding: 8px 14px; font-size: 14px; border-radius: 6px; z-index: 100; }
#databaseModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 200; justify-content: center; align-items: center; }
#modalContent { background: #1f1f21; width: 90%; max-width: 700px; max-height: 85vh; overflow-y: auto; border-radius: 12px; padding: 20px; }

.group-title { color: #6aaa64; margin: 20px 0 10px 0; border-bottom: 2px solid #6aaa64; padding-bottom: 5px; font-size: 18px; }
#idolList div { padding: 6px 12px; border-bottom: 1px solid #333; }

<button onclick="askAttribute()" style="background:#6aaa64; color:white;">🚀 提出問題</button>

<h3 id="questionCount" style="font-size:22px; margin:15px; color:#bbb;">已提問次數：0</h3>
<div id="questionHistory"></div>
<h2 id="result"></h2>
<button onclick="startNewGame()" style="background:#555; padding:12px 24px;">新遊戲</button>

// 遊戲變數
let answer = {};
let gameOver = false;
let questionCount = 0;
let questionHistory = [];

const attrDisplay = {
    name: "名字", group: "所屬團體", nationality: "國籍",
    birth: "出生年", debut: "出道年", members: "團體人數"
};

// ==================== 開始新遊戲 ====================
function startNewGame() {
    answer = idols[Math.floor(Math.random() * idols.length)];
    gameOver = false;
    questionCount = 0;
    questionHistory = [];
    document.getElementById("result").innerHTML = "";
    document.getElementById("questionValue").value = "";
    document.getElementById("suggestions").innerHTML = "";
    document.getElementById("questionHistory").innerHTML = "";
    updateQuestionCount();
}

// ==================== 名字推薦 ====================
function showQuestionSuggestions() {
    const input = document.getElementById("questionValue").value.toLowerCase().trim();
    const sugBox = document.getElementById("suggestions");
    sugBox.innerHTML = "";

    if (document.getElementById("attrSelect").value !== "name" || !input) return;

    const matches = idols.filter(i => i.name.toLowerCase().includes(input)).slice(0, 10);
    
    matches.forEach(i => {
        const div = document.createElement("div");
        div.innerText = `${i.name} (${i.group})`;
        div.onclick = () => {
            document.getElementById("questionValue").value = i.name;
            sugBox.innerHTML = "";
        };
        sugBox.appendChild(div);
    });
}

// ==================== 提出問題 ====================
function askAttribute() {
    if (gameOver) return;
    const attr = document.getElementById("attrSelect").value;
    let valueStr = document.getElementById("questionValue").value.trim();
    
    if (!valueStr) return alert("請輸入要問的值！");

    const isNumberInput = /^\d+$/.test(valueStr);

    if ((attr === "birth" || attr === "debut" || attr === "members") && !isNumberInput) {
        alert(`❌ 「${attrDisplay[attr]}」只能輸入數字！`);
        return;
    }
    if ((attr === "name" || attr === "group" || attr === "nationality") && isNumberInput) {
        alert(`❌ 「${attrDisplay[attr]}」不能輸入純數字！`);
        return;
    }

    // 題庫檢查
    if (attr === "name" && !idols.some(i => i.name.toLowerCase() === valueStr.toLowerCase())) {
        alert(`❌ 題庫中沒有「${valueStr}」！`);
        return;
    }
    if (attr === "group" && !idols.some(i => i.group.toLowerCase().includes(valueStr.toLowerCase()))) {
        alert(`❌ 題庫中沒有「${valueStr}」這個團體！`);
        return;
    }
    if (attr === "nationality" && !idols.some(i => i.nationality.toLowerCase().includes(valueStr.toLowerCase()))) {
        alert(`❌ 題庫中沒有「${valueStr}」這個國籍！`);
        return;
    }

    let isMatch = false;
    if (attr === "birth" || attr === "debut" || attr === "members") {
        isMatch = (answer[attr] === parseInt(valueStr));
    } else if (attr === "nationality" || attr === "group") {
        const asked = valueStr.toLowerCase().trim();
        const ansParts = answer[attr].toLowerCase().split(/[\/,]/).map(s => s.trim());
        isMatch = ansParts.some(p => p === asked);
    } else {
        isMatch = (answer[attr].toLowerCase() === valueStr.toLowerCase());
    }

    questionCount++;
    questionHistory.push({ attr, value: valueStr, isMatch });
    renderHistory();
    updateQuestionCount();

    document.getElementById("questionValue").value = "";
    document.getElementById("suggestions").innerHTML = "";

    if (attr === "name" && isMatch) {
        document.getElementById("result").innerHTML = 
            `🎉 恭喜答對！<br>答案就是 <b>${answer.name} (${answer.group})</b><br><br>總共用了 <b>${questionCount}</b> 次問題！`;
        gameOver = true;
    }
}

function renderHistory() {
    const container = document.getElementById("questionHistory");
    container.innerHTML = `<h3 style="margin:10px 0; color:#bbb;">提問紀錄 (${questionHistory.length} 次)</h3>`;
    questionHistory.forEach((q, i) => {
        const attrName = attrDisplay[q.attr];
        const status = q.isMatch ? 
            `<span style="color:#6aaa64;font-weight:bold;">✅ 是</span>` : 
            `<span style="color:#c44;font-weight:bold;">❌ 否</span>`;
        const div = document.createElement("div");
        div.innerHTML = `<div><strong>${i+1}.</strong> ${attrName} 是 <b>${q.value}</b> 嗎？</div><div>${status}</div>`;
        container.appendChild(div);
    });
    container.scrollTop = container.scrollHeight;
}

function updateQuestionCount() {
    document.getElementById("questionCount").textContent = `已提問次數：${questionCount}`;
}

// 題庫功能（完整）
function showDatabase() { /* ... 保持你原本的 showDatabase ... */ 
    const modal = document.getElementById("databaseModal");
    const list = document.getElementById("idolList");
    list.innerHTML = "";
    const groups = {};
    idols.forEach(i => {
        i.group.split('/').forEach(g => {
            const clean = g.trim();
            if (!groups[clean]) groups[clean] = [];
            groups[clean].push(i);
        });
    });
    Object.keys(groups).sort().forEach(groupName => {
        const members = groups[groupName];
        const title = document.createElement("div");
        title.className = "group-title";
        title.innerHTML = `<strong>${groupName}</strong> (${members.length} 人)`;
        list.appendChild(title);
        members.sort((a,b)=>a.name.localeCompare(b.name)).forEach(m=>{
            const div = document.createElement("div");
            div.innerText = `• ${m.name} (${m.nationality})`;
            list.appendChild(div);
        });
    });
    document.getElementById("totalCount").textContent = idols.length;
    modal.style.display = "flex";
}
function closeDatabase() { document.getElementById("databaseModal").style.display = "none"; }
